<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#7c3aed">
  <meta name="description" content="フラッシュカード管理画面 — カードの追加・編集・削除">
  <title>カード管理 ⚙️ — ことばのカード</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

  <!-- ─── ヘッダー ─────────────────────────────────────── -->
  <header class="admin-header">
    <h1>⚙️ カード管理</h1>
    <div class="header-actions">
      <a href="index.html" class="btn btn-ghost btn-sm">← アプリへ戻る</a>
      <button id="add-card-btn" class="btn btn-primary btn-sm">＋ カード追加</button>
    </div>
  </header>

  <!-- ─── メイン ────────────────────────────────────────── -->
  <main class="admin-main">

    <!-- タブ -->
    <div class="tabs" role="tablist">
      <button class="tab-btn active" data-tab="list"   role="tab" aria-selected="true">
        📋 カード一覧
      </button>
      <button class="tab-btn"        data-tab="backup" role="tab" aria-selected="false">
        💾 バックアップ
      </button>
      <button class="tab-btn"        data-tab="settings" role="tab" aria-selected="false">
        🔧 設定
      </button>
    </div>

    <!-- ─── タブ: カード一覧 ──────────────────────────── -->
    <div id="tab-list" class="tab-panel active" role="tabpanel">

      <!-- フィルターバー -->
      <div class="card-list-filters" id="list-filters" aria-label="カテゴリフィルター">
        <!-- JS で生成 -->
      </div>

      <!-- カード数 -->
      <div style="margin-bottom:12px; display:flex; align-items:center; gap:8px;">
        <span class="card-count-badge" id="card-count-badge">0 枚</span>
        <input
          id="search-input"
          type="text"
          placeholder="🔍 カードを検索..."
          style="flex:1; max-width:260px;"
          aria-label="カード検索"
        >
      </div>

      <!-- カードグリッド -->
      <div class="card-grid" id="card-grid" aria-label="カード一覧">
        <!-- JS で生成 -->
      </div>

    </div>

    <!-- ─── タブ: バックアップ ────────────────────────── -->
    <div id="tab-backup" class="tab-panel" role="tabpanel">

      <div class="section">
        <div class="section-head">
          <h2>💾 データのバックアップ・復元</h2>
        </div>
        <div class="section-body">
          <div class="backup-actions">

            <div class="backup-card">
              <span class="backup-card-icon">📤</span>
              <h3>エクスポート</h3>
              <p>現在のカードデータをJSONファイルとして保存します</p>
              <button id="export-btn" class="btn btn-primary mt-8">ダウンロード</button>
            </div>

            <div class="backup-card">
              <span class="backup-card-icon">📥</span>
              <h3>インポート</h3>
              <p>保存したJSONファイルからカードデータを復元します</p>
              <div style="position:relative; margin-top:8px;">
                <button class="btn btn-outline" style="width:100%;">ファイルを選択</button>
                <input
                  id="import-file"
                  type="file"
                  accept=".json"
                  style="position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;"
                  aria-label="JSONファイルをインポート"
                >
              </div>
            </div>

            <div class="backup-card">
              <span class="backup-card-icon">🔄</span>
              <h3>初期化</h3>
              <p>すべてのカードをデフォルト（初期データ）に戻します</p>
              <button id="reset-btn" class="btn btn-danger mt-8">初期化する</button>
            </div>

          </div>
        </div>
      </div>

    </div>

    <!-- ─── タブ: 設定 ────────────────────────────────── -->
    <div id="tab-settings" class="tab-panel" role="tabpanel">

      <div class="section">
        <div class="section-head">
          <h2>🔧 アプリ設定</h2>
        </div>
        <div class="section-body">
          <div class="form-grid">

            <div class="form-group">
              <label for="setting-speed">🐢 読み上げ速度</label>
              <input
                id="setting-speed"
                type="range"
                min="0.5" max="1.5" step="0.05"
                value="0.78"
                aria-label="読み上げ速度"
              >
              <small id="speed-val" class="text-muted">0.78 倍速</small>
            </div>

            <div class="form-group">
              <label for="setting-pitch">🎵 ピッチ（声の高さ）</label>
              <input
                id="setting-pitch"
                type="range"
                min="0.8" max="1.5" step="0.05"
                value="1.15"
                aria-label="ピッチ"
              >
              <small id="pitch-val" class="text-muted">1.15</small>
            </div>

            <div class="form-group">
              <label for="setting-voice">🗣️ 音声</label>
              <select id="setting-voice" aria-label="音声選択">
                <option value="">自動選択（日本語）</option>
              </select>
            </div>

            <div class="form-group">
              <label>
                <input id="setting-autoplay" type="checkbox" checked style="width:auto;margin-right:8px;">
                🔊 カード切替時に自動読み上げ
              </label>
            </div>

            <div>
              <button id="save-settings-btn" class="btn btn-primary">設定を保存</button>
              <button id="test-tts-btn" class="btn btn-outline mt-4" style="margin-left:8px;">
                🔊 テスト読み上げ
              </button>
            </div>

          </div>
        </div>
      </div>

    </div>
  </main>

  <!-- ─── カード追加/編集 モーダル ──────────────────────── -->
  <div id="card-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-label="カード編集">
    <div class="modal">
      <div class="modal-head">
        <h2 id="modal-title">カードを追加</h2>
        <button class="modal-close" id="modal-close-btn" aria-label="閉じる">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-grid">

          <!-- プレビュー -->
          <div class="form-group full" style="align-items:center;">
            <label>プレビュー</label>
            <div id="form-preview-wrap" style="background:#f8fafc;">
              <div class="preview-visual" id="preview-visual">❓</div>
              <div class="preview-name"  id="preview-name">なまえ</div>
            </div>
          </div>

          <!-- カテゴリ -->
          <div class="form-group">
            <label for="form-category">📂 カテゴリ *</label>
            <select id="form-category">
              <!-- JS で生成 -->
            </select>
          </div>

          <!-- 表示タイプ -->
          <div class="form-group" id="display-type-group">
            <label for="form-type">🎨 表示タイプ</label>
            <select id="form-type">
              <option value="emoji">絵文字</option>
              <option value="image">画像</option>
              <option value="color">色（いろカテゴリ）</option>
              <option value="number">数字（かずカテゴリ）</option>
            </select>
          </div>

          <!-- カード名（ひらがな） -->
          <div class="form-group">
            <label for="form-name">✍️ カード名（ひらがな）*</label>
            <input id="form-name" type="text" placeholder="例: いぬ" maxlength="20">
          </div>

          <!-- 読み上げテキスト -->
          <div class="form-group">
            <label for="form-reading">🔊 読み上げテキスト</label>
            <input id="form-reading" type="text" placeholder="空白の場合はカード名を使用">
          </div>

          <!-- 絵文字（emoji タイプ時） -->
          <div class="form-group" id="field-emoji">
            <label for="form-emoji">😀 絵文字</label>
            <input id="form-emoji" type="text" placeholder="例: 🐶" maxlength="4">
          </div>

          <!-- 数字（number タイプ時） -->
          <div class="form-group hidden" id="field-numeral">
            <label for="form-numeral">🔢 数字</label>
            <input id="form-numeral" type="text" placeholder="例: 1" maxlength="3">
          </div>

          <!-- 色（color タイプ時） -->
          <div class="form-group hidden" id="field-color">
            <label for="form-color">🎨 色</label>
            <div class="color-input-wrap">
              <input id="form-color" type="color" value="#ef4444">
              <input id="form-color-text" type="text" placeholder="#ef4444" style="flex:1;">
            </div>
          </div>

          <!-- 画像アップロード（image タイプ時） -->
          <div class="form-group full hidden" id="field-image">
            <label>🖼️ 画像</label>
            <div class="image-upload-zone" id="image-drop-zone">
              <input type="file" id="form-image-file" accept="image/*">
              <span class="upload-icon">🖼️</span>
              <span class="upload-text">タップして画像を選択<br>JPG / PNG / GIF / WebP 対応</span>
            </div>
            <div class="image-preview-wrap" id="image-preview-wrap">
              <img id="image-preview" class="image-preview" src="" alt="プレビュー">
              <span class="image-preview-name" id="image-preview-name">ファイル名</span>
              <button id="clear-image-btn" class="btn btn-ghost btn-sm">×</button>
            </div>
            <div class="form-group mt-8">
              <label for="form-image-url">または URL で指定</label>
              <input id="form-image-url" type="text" placeholder="https://example.com/image.jpg">
            </div>
          </div>

          <!-- 背景色 -->
          <div class="form-group">
            <label for="form-bgcolor">🎨 カード背景色</label>
            <div class="color-input-wrap">
              <input id="form-bgcolor" type="color" value="#fff7ed">
              <input id="form-bgcolor-text" type="text" placeholder="#fff7ed" style="flex:1;">
            </div>
          </div>

          <!-- 音声ファイル -->
          <div class="form-group">
            <label>🎵 音声（任意）</label>
            <div class="audio-controls">
              <button id="record-audio-btn" class="btn btn-outline btn-sm" type="button">🎙️ 録音する</button>
              <button id="stop-record-btn" class="btn btn-danger btn-sm hidden" type="button">⏹️ 停止</button>
              <div style="position:relative;">
                <button class="btn btn-ghost btn-sm" type="button">📁 ファイル選択</button>
                <input
                  id="form-audio-file"
                  type="file"
                  accept="audio/*"
                  style="position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;"
                >
              </div>
              <button id="clear-audio-btn" class="btn btn-ghost btn-sm hidden" type="button">× 削除</button>
              <span class="audio-status" id="audio-status">未設定（TTSを使用）</span>
            </div>
          </div>

        </div>
      </div>
      <div class="modal-footer">
        <button id="modal-cancel-btn" class="btn btn-ghost">キャンセル</button>
        <button id="modal-save-btn"   class="btn btn-primary">💾 保存</button>
      </div>
    </div>
  </div>

  <!-- トースト通知 -->
  <div id="toast-container" aria-live="polite"></div>

  <!-- スクリプト -->
  <script src="js/cards-data.js"></script>
  <script src="js/admin.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js');
      });
    }
  </script>
</body>
</html>
